name: Release

on:
  push:
    tags: ['v*']
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    name: jobdash ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: amd64
            runner: macos-13
          - os: darwin
            arch: arm64
            runner: macos-latest
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: windows
            arch: amd64
            runner: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Get version
        id: version
        run: |
          sha="$(git rev-parse --short HEAD)"
          # Get the highest existing release tag, strip 'v', bump major
          last_tag="$(gh release list --limit 1 --json tagName --jq '.[0].tagName' 2>/dev/null || echo 'v0')"
          maj="$(echo "$last_tag" | sed 's/^v//' | cut -d. -f1)"
          maj=$((maj + 1))
          echo "tag=v${maj}" >> $GITHUB_OUTPUT
          echo "sha=$sha" >> $GITHUB_OUTPUT

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          go build -tags production -trimpath -buildvcs=false \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.tag }}" \
            -o jobdash-${{ steps.version.outputs.tag }}-${{ matrix.os }}-${{ matrix.arch }} .
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '1'
          CGO_CFLAGS: "-mmacosx-version-min=12.0"
          CGO_LDFLAGS: "-mmacosx-version-min=12.0"
          MACOSX_DEPLOYMENT_TARGET: "12.0"

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          go build -tags production -trimpath -buildvcs=false \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.tag }}" \
            -o jobdash-${{ steps.version.outputs.tag }}-${{ matrix.os }}-${{ matrix.arch }} .
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '1'

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          go build -tags production -trimpath -buildvcs=false \
            -ldflags="-s -w -X main.version=${{ steps.version.outputs.tag }}" \
            -o jobdash-${{ steps.version.outputs.tag }}-windows-amd64.exe .
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '0'

      - name: Package (macOS .zip)
        if: runner.os == 'macOS'
        run: |
          BINARY=jobdash-${{ steps.version.outputs.tag }}-${{ matrix.os }}-${{ matrix.arch }}
          mkdir -p "$BINARY.app/Contents/MacOS"
          mkdir -p "$BINARY.app/Contents/Resources"
          cp build/darwin/icons.icns "$BINARY.app/Contents/Resources/" 2>/dev/null || true
          cp build/darwin/Info.plist "$BINARY.app/Contents/" 2>/dev/null || true
          cp "$BINARY" "$BINARY.app/Contents/MacOS/jobdash"
          codesign --force --deep --sign - "$BINARY.app"
          zip -r "$BINARY.zip" "$BINARY.app"

      - name: Package (Linux .tar.gz)
        if: runner.os == 'Linux'
        run: |
          BINARY=jobdash-${{ steps.version.outputs.tag }}-${{ matrix.os }}-${{ matrix.arch }}
          tar czf "$BINARY.tar.gz" "$BINARY"

      - name: Package (Windows .zip)
        if: runner.os == 'Windows'
        run: |
          $BINARY = "jobdash-${{ steps.version.outputs.tag }}-windows-amd64"
          Compress-Archive -Path "$BINARY.exe" -DestinationPath "$BINARY.zip"

      - name: Upload Release Asset
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${{ steps.version.outputs.tag }}"
          # Create the release (no tag exists yet)
          gh release create "$tag" --title "JobDash $tag" \
            --notes "Auto-built from main@${{ steps.version.outputs.sha }}" \
            2>/dev/null || true
          for f in jobdash-$tag-*; do
            [ -f "$f" ] || continue
            echo "Uploading: $f"
            gh release upload "$tag" "$f" --clobber
          done
