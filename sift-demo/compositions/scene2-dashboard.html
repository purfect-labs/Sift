<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #0a0c14; font-family: "Inter", sans-serif; }
      .scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
      .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; object-position: top; opacity: 0; background: #0a0c14; }
      .overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(10,12,20,0.95)); padding: 200px 100px 60px; }
      .title { font-size: 56px; font-weight: 700; color: #e8e8f0; letter-spacing: -0.02em; margin-bottom: 12px; }
      .subtitle { font-size: 24px; color: #8b9dff; font-weight: 500; }
      .badges { display: flex; gap: 16px; margin-top: 20px; }
      .badge { font-size: 16px; color: #999; padding: 8px 18px; border: 1px solid #2a2f50; border-radius: 20px; }
    </style>
  </head>
  <body>
    <div class="scene" data-composition-id="scene2-dashboard" data-width="1920" data-height="1080">
      <img class="bg-image" id="bg" src="../assets/sift-mainjobs-matrix.png" />
      <div class="overlay">
        <div class="title" id="title" style="opacity: 0;">AI-Powered Job Search &amp; Tracker</div>
        <div class="subtitle" id="subtitle" style="opacity: 0;">Your resume. Your pipeline. Your data — all local.</div>
        <div class="badges">
          <span class="badge" id="badge1" style="opacity: 0;">AI-Powered</span>
          <span class="badge" id="badge2" style="opacity: 0;">100% Local</span>
          <span class="badge" id="badge3" style="opacity: 0;">Open Source</span>
        </div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.to("#bg", { opacity: 1, duration: 0.5, ease: "power2.out" }, 0);
      tl.fromTo("#title", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0.5);
      tl.fromTo("#subtitle", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 1.2);
      tl.to("#badge1", { opacity: 1, duration: 0.3 }, 2.0);
      tl.to("#badge2", { opacity: 1, duration: 0.3 }, 2.3);
      tl.to("#badge3", { opacity: 1, duration: 0.3 }, 2.6);
      tl.to("#title", { opacity: 0, duration: 0.3, ease: "power3.in" }, 6.2);
      tl.to("#subtitle", { opacity: 0, duration: 0.3, ease: "power3.in" }, 6.2);
      tl.to("#bg", { opacity: 0, duration: 0.4, ease: "power3.in" }, 6.4);
      window.__timelines["scene2-dashboard"] = tl;
    </script>
  </body>
</html>
