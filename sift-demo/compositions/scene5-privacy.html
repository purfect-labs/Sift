<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #0a0c14; font-family: "Inter", sans-serif; }
      .scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
      .bg-image { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; object-position: top; opacity: 0; background: #0a0c14; }
      .overlay { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(transparent, rgba(10,12,20,0.95)); padding: 200px 100px 60px; }
      .title { font-size: 52px; font-weight: 700; color: #e8e8f0; letter-spacing: -0.02em; margin-bottom: 12px; }
      .subtitle { font-size: 22px; color: #8b9dff; font-weight: 500; margin-bottom: 20px; }
      .privacy-points { display: flex; gap: 24px; }
      .privacy-point { padding: 16px 24px; border: 1px solid #1e2240; border-radius: 10px; background: rgba(13,15,26,0.8); text-align: center; }
      .privacy-icon { font-size: 28px; margin-bottom: 8px; }
      .privacy-label { font-size: 16px; color: #ccc; font-weight: 600; }
      .privacy-desc { font-size: 13px; color: #777; margin-top: 4px; }
      .github-url { font-size: 28px; color: #8b9dff; font-family: monospace; font-weight: 600; letter-spacing: -0.01em; }
    </style>
  </head>
  <body>
    <div class="scene" data-composition-id="scene5-privacy" data-width="1920" data-height="1080">
      <img class="bg-image" id="bg" src="../assets/sift-settings-and-keywork-extractions.png" />
      <div class="overlay">
        <div class="title" id="title" style="opacity: 0;">Open Source. Your Data Stays Yours.</div>
        <div class="subtitle" id="subtitle" style="opacity: 0;">SQLite on your machine. No cloud accounts. No telemetry.</div>
        <div class="privacy-points">
          <div class="privacy-point" id="pp1" style="opacity: 0;">
            <div class="privacy-icon">🔒</div>
            <div class="privacy-label">Local Only</div>
            <div class="privacy-desc">SQLite on disk</div>
          </div>
          <div class="privacy-point" id="pp2" style="opacity: 0;">
            <div class="privacy-icon">🛡️</div>
            <div class="privacy-label">No Cloud</div>
            <div class="privacy-desc">Zero accounts</div>
          </div>
          <div class="privacy-point" id="pp3" style="opacity: 0;">
            <div class="privacy-icon">📖</div>
            <div class="privacy-label">MIT License</div>
            <div class="privacy-desc">Open source</div>
          </div>
        </div>
        <div class="github-url" id="ghurl" style="opacity: 0; margin-top: 24px;">github.com/purfect-labs/sift</div>
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.to("#bg", { opacity: 1, duration: 0.5, ease: "power2.out" }, 0);
      tl.fromTo("#title", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 0.5);
      tl.fromTo("#subtitle", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" }, 1.2);
      tl.to("#pp1", { opacity: 1, duration: 0.3 }, 2.0);
      tl.to("#pp2", { opacity: 1, duration: 0.3 }, 2.3);
      tl.to("#pp3", { opacity: 1, duration: 0.3 }, 2.6);
      tl.to("#ghurl", { opacity: 1, duration: 0.5, ease: "power2.out" }, 3.2);
      tl.to("#title", { opacity: 0, duration: 0.3 }, 6.4);
      tl.to("#subtitle", { opacity: 0, duration: 0.3 }, 6.4);
      tl.to("#bg", { opacity: 0, duration: 0.4 }, 6.6);
      window.__timelines["scene5-privacy"] = tl;
    </script>
  </body>
</html>
