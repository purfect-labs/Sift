<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background: #0a0c14; font-family: "Inter", sans-serif; }
      .scene { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
      .hook-line { font-size: 72px; font-weight: 700; color: #e8e8f0; letter-spacing: -0.02em; text-align: center; line-height: 1.2; }
      .hook-accent { color: #8b9dff; }
      .hook-sub { font-size: 28px; color: #666; margin-top: 24px; font-weight: 400; letter-spacing: 0.05em; }
      img { display: none; }
    </style>
  </head>
  <body>
    <div id="scene-content" class="scene" data-composition-id="scene1-hook" data-width="1920" data-height="1080">
      <div id="hook-1" class="hook-line" style="opacity: 0;">
        Job hunting is <span class="hook-accent">chaos</span>.
      </div>
      <div id="hook-2" class="hook-line" style="opacity: 0; margin-top: 8px;">
        We <span class="hook-accent">fixed</span> that.
      </div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      tl.fromTo("#hook-1", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.7, ease: "power3.out" }, 0.3);
      tl.fromTo("#hook-2", { opacity: 0, y: 30 }, { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" }, 1.2);
      tl.to("#hook-1", { opacity: 0, y: -20, duration: 0.4, ease: "power3.in" }, 3.2);
      tl.to("#hook-2", { opacity: 0, y: -20, duration: 0.3, ease: "power3.in" }, 3.4);
      window.__timelines["scene1-hook"] = tl;
    </script>
  </body>
</html>
